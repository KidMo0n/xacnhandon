<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Xác Nhận Đơn Hàng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            line-height: 1.4;
        }
        
        body.capturing {
            background: #ffffff;
        }
        
        body.capturing .share-section {
            display: none !important;
        }
        
        .receipt {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border: 2px solid #000;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .date {
            font-size: 14px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }
        
        .info-row:last-of-type {
            border-bottom: 2px solid #000;
            margin-bottom: 20px;
            padding-bottom: 15px;
        }
        
        .label {
            font-weight: bold;
            width: 40%;
        }
        
        .value {
            width: 58%;
            text-align: right;
        }
        
        .products-title {
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #000;
        }
        
        .product-header {
            display: grid;
            grid-template-columns: 2.5fr 1.2fr 2fr;
            gap: 10px;
            font-weight: bold;
            border-bottom: 2px solid #000;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        
        .product-header div {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        
        .product-header div:nth-child(2) {
            justify-content: center;
        }
        
        .product-header div:nth-child(3) {
            justify-content: center;
        }
        
        .product-item {
            display: grid;
            grid-template-columns: 2.5fr 1.2fr 2fr;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            align-items: start;
        }
        
        .product-item div:nth-child(1) {
            font-weight: bold;
        }
        
        .product-item div:nth-child(2) {
            display: none;
        }
        
        .product-item div:nth-child(3) {
            text-align: center;
            background: #f5f5f5;
            padding: 6px 8px;
            border-radius: 4px;
        }
        
        .product-item div:nth-child(3) .qty-main {
            font-weight: bold;
            font-size: 14px;
            display: block;
            margin-bottom: 3px;
            color: #000;
        }
        
        .product-item div:nth-child(3) .qty-boxes {
            font-weight: normal;
            font-size: 12px;
            color: #666;
            display: block;
        }
        
        .product-item div:nth-child(4) {
            word-wrap: break-word;
            overflow-wrap: break-word;
            text-align: center;
        }
        
        /* Hiển thị loại cây dưới mã cây */
        .product-item div:nth-child(1)::after {
            content: attr(data-type);
            display: block;
            font-weight: normal;
            color: #666;
            font-size: 12px;
            margin-top: 3px;
        }
        
        .share-section {
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #000;
            padding-top: 20px;
        }
        
        .share-btn {
            background: #000;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        
        .share-btn:hover {
            background: #333;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .receipt {
                margin: 0;
                padding: 15px;
                border-width: 1px;
            }
            
            .title {
                font-size: 16px;
            }
            
            .info-row {
                flex-direction: column;
                gap: 3px;
                margin-bottom: 15px;
                padding-bottom: 10px;
            }
            
            .label {
                width: 100%;
                font-size: 12px;
                color: #666;
            }
            
            .value {
                text-align: left;
                width: 100%;
                font-size: 14px;
                font-weight: bold;
            }
            
            .products-title {
                font-size: 14px;
                margin-bottom: 12px;
            }
            
            /* Mobile: Layout 3 cột khổ ngang */
            .product-header {
                display: grid;
                grid-template-columns: 2.5fr 1.2fr 2fr;
                gap: 8px;
                font-weight: bold;
                border-bottom: 2px solid #000;
                padding-bottom: 6px;
                margin-bottom: 8px;
                font-size: 11px;
                align-items: center;
            }
            
            .product-header div {
                display: flex;
                align-items: center;
                justify-content: flex-start;
            }
            
            .product-header div:nth-child(2),
            .product-header div:nth-child(3) {
                justify-content: center;
            }
            
            .product-item {
                display: grid;
                grid-template-columns: 2.5fr 1.2fr 2fr;
                gap: 8px;
                padding: 6px 0;
                border-bottom: 1px solid #ddd;
                font-size: 11px;
                align-items: start;
            }
            
            .product-item div:nth-child(1) {
                font-weight: bold;
                color: #000;
            }
            
            .product-item div:nth-child(2) {
                display: none;
            }
            
            .product-item div:nth-child(3) {
                text-align: center;
                background: #f5f5f5;
                padding: 5px 6px;
                border-radius: 3px;
            }
            
            .product-item div:nth-child(3) .qty-main {
                font-weight: bold;
                font-size: 11px;
                display: block;
                margin-bottom: 2px;
                color: #000;
            }
            
            .product-item div:nth-child(3) .qty-boxes {
                font-weight: normal;
                font-size: 10px;
                color: #666;
                display: block;
            }
            
            .product-item div:nth-child(4) {
                color: #333;
                font-size: 10px;
                word-wrap: break-word;
                overflow-wrap: break-word;
                text-align: center;
            }
            
            .product-item div:nth-child(4):empty {
                opacity: 0.3;
            }
            
            .product-item div:nth-child(1)::after {
                content: attr(data-type);
                display: block;
                font-weight: normal;
                color: #666;
                font-size: 10px;
                margin-top: 2px;
            }
            
            .share-btn {
                padding: 15px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="receipt">
        <div class="header">
            <div class="title">PHIẾU XÁC NHẬN ĐƠN HÀNG</div>
            <div class="date" id="order-date"></div>
        </div>
        
        <div class="info-row">
            <div class="label">Khách hàng:</div>
            <div class="value" id="customer-name"></div>
        </div>
        
        <div class="info-row">
            <div class="label">Thông tin:</div>
            <div class="value" id="customer-info"></div>
        </div>
        
        <div class="info-row">
            <div class="label">Tổng số thùng:</div>
            <div class="value" id="total-boxes"></div>
        </div>
        
        <div class="info-row">
            <div class="label">Giao hàng:</div>
            <div class="value" id="delivery-method"></div>
        </div>
        
        <div class="products-title">CHI TIẾT ĐƠN HÀNG</div>
        
        <div class="product-header">
            <div>MÃ CÂY / LOẠI</div>
            <div>SỐ LƯỢNG</div>
            <div>GHI CHÚ</div>
        </div>
        
        <div id="product-list">
            <!-- Products will be loaded here -->
        </div>
        
        <div class="share-section">
            <button class="share-btn" onclick="shareOrder()">CHIA SẺ HÌNH ẢNH</button>
        </div>
    </div>

    <script>
        function getUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                date: urlParams.get('date') || '',
                customerName: urlParams.get('customerName') || '',
                customerInfo: urlParams.get('customerInfo') || '',
                totalBoxes: urlParams.get('totalBoxes') || '',
                deliveryMethod: urlParams.get('deliveryMethod') || '',
                productCodes: urlParams.get('productCodes') || '',
                productTypes: urlParams.get('productTypes') || '',
                productQuantities: urlParams.get('productQuantities') || '',
                productNotes: urlParams.get('productNotes') || ''
            };
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                const first = parseInt(parts[0]);
                const second = parseInt(parts[1]);
                if (first > 12) return dateStr;
                if (second > 12) return `${parts[1]}/${parts[0]}/${parts[2]}`;
                return `${parts[1]}/${parts[0]}/${parts[2]}`;
            }
            return dateStr;
        }
        
        function displayOrderInfo() {
            const params = getUrlParams();
            
            document.getElementById('order-date').textContent = formatDate(params.date);
            document.getElementById('customer-name').textContent = params.customerName;
            document.getElementById('customer-info').textContent = params.customerInfo;
            document.getElementById('total-boxes').textContent = params.totalBoxes;
            document.getElementById('delivery-method').textContent = params.deliveryMethod;
            
            // Xử lý danh sách sản phẩm từ các list riêng biệt
            const productList = document.getElementById('product-list');
            productList.innerHTML = '';
            
            if (params.productCodes) {
                const codes = params.productCodes.split(',');
                const types = params.productTypes ? params.productTypes.split(',') : [];
                const quantities = params.productQuantities ? params.productQuantities.split(',') : [];
                
                let notes = [];
                if (params.productNotes) {
                    if (params.productNotes.includes('||')) {
                        notes = params.productNotes.split('||');
                    } else {
                        notes = params.productNotes.split(',');
                    }
                    notes = notes.map(note => note.trim());
                }
                
                const maxItems = Math.max(codes.length, types.length, quantities.length);
                
                function shortenCode(code) {
                    if (!code) return '';
                    if (code.includes('-')) {
                        return code.split('-')[0].trim();
                    }
                    return code.trim();
                }
                
                const products = [];
                for (let i = 0; i < maxItems; i++) {
                    const code = codes[i] ? codes[i].trim() : '';
                    const shortCode = shortenCode(code);
                    const type = types[i] ? types[i].trim() : '';
                    const qty = quantities[i] ? quantities[i].trim() : '';
                    const note = notes[i] ? notes[i].trim() : '';
                    
                    products.push({ fullCode: code, shortCode, type, quantity: qty, note });
                }
                
                // Gộp các sản phẩm có cùng mã, loại và ghi chú
                const productMap = new Map();
                products.forEach(product => {
                    const key = `${product.shortCode}|||${product.type}|||${product.note}`;
                    if (productMap.has(key)) {
                        const existing = productMap.get(key);
                        existing.quantity = (parseFloat(existing.quantity) || 0) + (parseFloat(product.quantity) || 0);
                        existing.quantity = existing.quantity.toString();
                    } else {
                        productMap.set(key, { ...product });
                    }
                });
                
                const mergedProducts = [...productMap.values()];
                
                function calculateBoxes(type, quantity) {
                    const qty = parseFloat(quantity) || 0;
                    const openBracket = type.indexOf('<');
                    const closeBracket = type.indexOf('>');
                    if (openBracket > -1 && closeBracket > openBracket) {
                        const divisor = parseFloat(type.substring(openBracket + 1, closeBracket));
                        if (!isNaN(divisor) && divisor > 0) return Math.round(qty / divisor);
                    }
                    if (type.toLowerCase().includes('cành')) return Math.round(qty / 50);
                    return Math.round(qty / 20);
                }
                
                let totalBoxes = 0;
                let totalQuantity = 0;
                mergedProducts.forEach(product => {
                    totalBoxes += calculateBoxes(product.type, product.quantity);
                    totalQuantity += parseFloat(product.quantity) || 0;
                });
                
                const totalBoxesElement = document.getElementById('total-boxes');
                if (totalBoxesElement && !params.totalBoxes) {
                    totalBoxesElement.textContent = `${totalBoxes} THÙNG (${totalQuantity})`;
                }
                
                mergedProducts.forEach(product => {
                    const productItem = document.createElement('div');
                    productItem.className = 'product-item';
                    const boxes = calculateBoxes(product.type, product.quantity);
                    const qtyDisplay = boxes > 0
                        ? `<span class="qty-main">${product.quantity}</span><span class="qty-boxes">${boxes} thùng</span>`
                        : `<span class="qty-main">${product.quantity}</span>`;
                    productItem.innerHTML = `
                        <div data-type="${product.type}" title="${product.fullCode}">${product.shortCode}</div>
                        <div>${product.type}</div>
                        <div>${qtyDisplay}</div>
                        <div>${product.note}</div>
                    `;
                    productList.appendChild(productItem);
                });
            }
        }

        function buildShareTitle() {
            const params = getUrlParams();
            const name = params.customerName || 'Khách hàng';
            const date = formatDate(params.date);
            return date ? `Đơn hàng ${name} - ${date}` : `Đơn hàng ${name}`;
        }

        function buildShareText() {
            const params = getUrlParams();
            const boxes = params.totalBoxes || document.getElementById('total-boxes').textContent;
            const delivery = params.deliveryMethod;
            let text = buildShareTitle();
            if (boxes) text += `\n📦 ${boxes}`;
            if (delivery) text += `\n🚚 ${delivery}`;

            // Thêm danh sách mã cây - loại (số lượng)
            if (params.productCodes) {
                const codes = params.productCodes.split(',');
                const types = params.productTypes ? params.productTypes.split(',') : [];
                const quantities = params.productQuantities ? params.productQuantities.split(',') : [];

                const productMap = new Map();
                const maxItems = Math.max(codes.length, types.length, quantities.length);
                for (let i = 0; i < maxItems; i++) {
                    const code = (codes[i] || '').trim();
                    const shortCode = code.includes('-') ? code.split('-')[0].trim() : code;
                    const type = (types[i] || '').trim();
                    const qty = (quantities[i] || '').trim();
                    const key = `${shortCode}|||${type}`;
                    if (productMap.has(key)) {
                        const ex = productMap.get(key);
                        ex.quantity = ((parseFloat(ex.quantity) || 0) + (parseFloat(qty) || 0)).toString();
                    } else {
                        productMap.set(key, { shortCode, type, quantity: qty });
                    }
                }

                text += '\n';
                productMap.forEach(p => {
                    const label = [p.shortCode, p.type].filter(Boolean).join(' - ');
                    const boxes = calculateBoxes(p.type, p.quantity);
                    const boxStr = boxes > 0 ? ` - ${boxes} thùng` : '';
                    text += `\n🌿 ${label} (${p.quantity})${boxStr}`;
                });
            }

            return text;
        }
        
        function shareOrder() {
            if (typeof html2canvas === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                script.onload = captureAndShare;
                document.head.appendChild(script);
            } else {
                captureAndShare();
            }
        }
        
        function captureAndShare() {
            const receiptElement = document.querySelector('.receipt');
            document.body.classList.add('capturing');
            
            setTimeout(() => {
                html2canvas(receiptElement, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    useCORS: true
                }).then(canvas => {
                    document.body.classList.remove('capturing');
                    
                    canvas.toBlob(function(blob) {
                        const file = new File([blob], 'don-hang.png', { type: 'image/png' });
                        const shareTitle = buildShareTitle();
                        const shareText = buildShareText();
                        
                        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                            navigator.share({
                                title: shareTitle,
                                text: shareText,
                                files: [file]
                            });
                        } else {
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = 'phieu-xac-nhan-don-hang.png';
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                            alert('Đã tải xuống hình ảnh! Bạn có thể chia sẻ qua Zalo, Email, v.v.');
                        }
                    }, 'image/png');
                }).catch(err => {
                    document.body.classList.remove('capturing');
                    console.error('Lỗi tạo hình ảnh:', err);
                    alert('Không thể tạo hình ảnh. Vui lòng thử lại.');
                });
            }, 100);
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            displayOrderInfo();

            // Cập nhật <title> tag động
            const params = getUrlParams();
            if (params.customerName) {
                document.title = buildShareTitle();
            }
        });
    </script>
</body>
</html>
